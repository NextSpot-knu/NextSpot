# NextSpot CI — docs/IMPROVEMENT_PLAN.md WS-E
# web: lint → typecheck → 단위테스트(voiceIntent) → 정적 export 빌드
# api: ruff → pytest (Python 3.11, Dockerfile 과 동일 버전)
# schema: RESET_AND_SETUP.sql 이 migrations/ 와 일치하는지 검증 (D2 — migrations 가 소스 오브 트루스)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=apps/web
      - run: npm run typecheck --workspace=apps/web
      - run: npm run test --workspace=apps/web
      # 정적 export 빌드 — 클라이언트 코드는 env 부재 시 플레이스홀더 폴백을 갖고 있어 키 없이 빌드 가능.
      - run: npm run build --workspace=apps/web

  api:
    name: api (ruff · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      # 단위테스트는 네트워크/실DB 미사용. Settings(부팅) 필수 env 는 플레이스홀더로 충족.
      - run: pytest -q
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: ci-placeholder-anon-key
          JWT_SECRET: ci-placeholder-jwt-secret
          ADMIN_API_TOKEN: ci-placeholder-admin-token

  schema:
    name: schema (RESET ↔ migrations 일치 검증)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # RESET_AND_SETUP.sql 은 자동 생성 산출물 — 재생성 결과가 커밋본과 다르면 실패.
      # 실패 시: RESET 이 migrations 와 불일치 — `node scripts/build_reset.mjs` 재실행 후 커밋할 것.
      #          (RESET_AND_SETUP.sql 을 직접 수정했다면 되돌리고 migrations/ 에 반영할 것.)
      - run: node scripts/build_reset.mjs
      - run: git diff --exit-code supabase/RESET_AND_SETUP.sql

  e2e:
    name: e2e (Chromium · 390px · 4 locales)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start deterministic web server
        run: npm run dev --workspace=apps/web -- --hostname 127.0.0.1 --port 3100 > /tmp/nextspot-web.log 2>&1 &
      - name: Wait for web server
        run: for i in {1..60}; do curl -fsS http://127.0.0.1:3100 >/dev/null && exit 0; sleep 1; done; cat /tmp/nextspot-web.log; exit 1
      - run: npm run test:e2e --workspace=apps/web
        env:
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
