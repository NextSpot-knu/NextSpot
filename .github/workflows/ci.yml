# NextSpot CI — docs/IMPROVEMENT_PLAN.md WS-E
# web: lint → typecheck → 단위테스트(voiceIntent) → 정적 export 빌드
# api: ruff → pytest (Python 3.11, Dockerfile 과 동일 버전)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=apps/web
      - run: npm run typecheck --workspace=apps/web
      - run: npm run test --workspace=apps/web
      # 정적 export 빌드 — 클라이언트 코드는 env 부재 시 플레이스홀더 폴백을 갖고 있어 키 없이 빌드 가능.
      - run: npm run build --workspace=apps/web

  api:
    name: api (ruff · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      # 단위테스트는 네트워크/실DB 미사용. Settings(부팅) 필수 env 는 플레이스홀더로 충족.
      - run: pytest -q
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: ci-placeholder-anon-key
          JWT_SECRET: ci-placeholder-jwt-secret
          ADMIN_API_TOKEN: ci-placeholder-admin-token
