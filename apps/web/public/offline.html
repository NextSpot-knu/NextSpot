<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#faf5ec" />
  <title>오프라인 · NextSpot</title>
  <style>
    /* 한지 아이보리 + 금박 — 앱과 동일 톤. 프레임워크 없이 인라인. */
    :root {
      --hanji: #faf5ec;
      --hanji-edge: #efe6d2;
      --gold: #c8a24a;
      --gold-deep: #a6822f;
      --ink: #2b2320;
      --ink-soft: #6b5f52;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(120% 90% at 50% 0%, #fffdf8 0%, var(--hanji) 55%, var(--hanji-edge) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-align: center;
    }
    .card {
      max-width: 400px;
      width: 100%;
    }
    .badge {
      width: 88px;
      height: 88px;
      margin: 0 auto 28px;
      border-radius: 24px;
      background: var(--hanji);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      font-size: 48px;
      color: var(--gold-deep);
      box-shadow: 0 8px 28px rgba(166, 130, 47, 0.18);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-family: "Noto Serif KR", Georgia, serif;
    }
    p { margin: 0; line-height: 1.6; }
    .sub-ko { color: var(--ink-soft); font-size: 15px; }
    .sub-en { color: var(--ink-soft); font-size: 13px; margin-top: 10px; opacity: 0.85; }
    .actions { margin-top: 28px; }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%);
      box-shadow: 0 6px 18px rgba(166, 130, 47, 0.28);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    button:active { transform: translateY(1px); box-shadow: 0 3px 10px rgba(166, 130, 47, 0.24); }
    .hairline {
      width: 40px;
      height: 2px;
      margin: 22px auto;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">N</div>
    <h1>오프라인이에요</h1>
    <p class="sub-ko">인터넷 연결을 확인해 주세요.</p>
    <div class="hairline" aria-hidden="true"></div>
    <p class="sub-en">You're offline. Please check your internet connection.</p>
    <div class="actions">
      <button type="button" onclick="location.reload()">다시 시도 · Retry</button>
    </div>
  </main>
</body>
</html>
